<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Web - Multi-Device</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-app: #111b21;
      --bg-sidebar: #111b21;
      --bg-chat: #0b141a;
      --bg-panel: #1f2c33;
      --bg-input: #2a3942;
      --bg-msg-out: #005c4b;
      --bg-msg-in: #1f2c33;
      --bg-hover: #2a3942;
      --bg-active: #2a3942;
      --accent: #00a884;
      --accent-dim: #00896c;
      --text-primary: #e9edef;
      --text-secondary: #8696a0;
      --border: #222d34;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg-app);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100%;
      width: 100%;
    }

    /* Sidebar */
    #sidebar {
      width: 30%;
      min-width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
    }

    #sidebar-header {
      padding: 10px 16px;
      background: var(--bg-panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #search-bar {
      padding: 8px;
      display: flex;
      gap: 8px;
      background: var(--bg-sidebar);
    }

    #search-input {
      flex: 1;
      background: var(--bg-input);
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      outline: none;
    }

    .btn-refresh {
      background: var(--bg-input);
      border: none;
      border-radius: 8px;
      width: 40px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 18px;
      transition: 0.2s;
    }

    .btn-refresh:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: 0.2s;
    }

    .chat-item:hover {
      background: var(--bg-hover);
    }

    .chat-item.active {
      background: var(--bg-active);
    }

    .chat-info {
      flex: 1;
      margin-left: 12px;
      overflow: hidden;
    }

    .chat-name {
      font-weight: 500;
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main Chat */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
      position: relative;
    }

    #chat-header {
      padding: 10px 16px;
      background: var(--bg-panel);
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    #messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 5%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14.5px;
      position: relative;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .msg-in {
      align-self: flex-start;
      background: var(--bg-msg-in);
    }

    .msg-out {
      align-self: flex-end;
      background: var(--bg-msg-out);
    }

    #chat-input-area {
      padding: 10px 16px;
      background: var(--bg-panel);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #msg-input {
      flex: 1;
      background: var(--bg-input);
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      color: var(--text-primary);
      outline: none;
      resize: none;
      max-height: 120px;
    }

    /* Auth Screens */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: var(--bg-app);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #qr-container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <span style="font-weight: 600;">Minhas Contas</span>
        <button onclick="showPage('accounts')"
          style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:600;">Gerenciar</button>
      </div>
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="Pesquisar conversas" oninput="renderChatList()" />
        <button class="btn-refresh" onclick="loadChats()" title="Atualizar conversas">&#x21bb;</button>
      </div>
      <div id="chat-list"></div>
    </div>

    <div id="main">
      <div id="chat-header" style="display:none;">
        <div id="active-chat-name" style="font-weight:600;"></div>
      </div>
      <div id="messages-area">
        <div style="margin: auto; text-align: center; color: var(--text-secondary);">
          <p>Selecione uma conversa para começar</p>
        </div>
      </div>
      <div id="chat-input-area" style="display:none;">
        <textarea id="msg-input" placeholder="Digite uma mensagem" rows="1" oninput="autoResize(this)"
          onkeydown="handleKey(e)"></textarea>
        <button onclick="sendMessage()"
          style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:24px;">&#10148;</button>
      </div>

      <div id="page-accounts" class="page" style="display:flex;">
        <h2>Conectar Instâncias</h2>
        <div id="accounts-grid" style="display:flex; gap:20px; margin-top:30px;">
        </div>
      </div>

      <div id="page-qr" class="page">
        <h2 id="qr-acc-name">Conectar WhatsApp</h2>
        <div id="qr-container"></div>
        <p id="qr-status" style="color:var(--text-secondary);">Aguardando geração do código...</p>
        <button onclick="showPage('accounts')"
          style="margin-top:20px; background:var(--bg-panel); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Voltar</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    let accountStates = {};
    let activeChat = null;
    let allChats = [];

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      const target = document.getElementById('page-' + pageId);
      if (target) target.style.display = 'flex';
    }

    // ── Socket ────────────────────────────────────────────────────────────────────
    socket.on('status_update', (data) => {
      const { accountId, status, qr, ready, name } = data;
      const wasReady = accountStates[accountId] ? accountStates[accountId].ready : false;

      accountStates[accountId] = { status, qr, ready, name: name || accountId };
      renderAccounts();

      if (status === 'qr' && qr) {
        const qrCont = document.getElementById('qr-container');
        qrCont.innerHTML = `<img src="${qr}" style="width:256px; height:256px;" />`;
        document.getElementById('qr-acc-name').innerText = `Conectar: ${name || accountId}`;
        showPage('qr');
      }

      // Lógica de Sincronização Automática
      if (!wasReady && ready) {
        showPage('chats'); // Volta para a lista
        const list = document.getElementById('chat-list');
        list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-secondary);"><div class="spinner" style="margin:0 auto 10px;"></div><p>Sincronizando conversas...</p></div>';

        // Espera o cache do WhatsApp estabilizar
        setTimeout(() => { loadChats(); }, 3500);
      }
    });

    function renderAccounts() {
      const grid = document.getElementById('accounts-grid');
      if (!grid) return;
      grid.innerHTML = Object.entries(accountStates).map(([id, s]) => `
        <div style="background:var(--bg-panel); padding:20px; border-radius:12px; text-align:center; width:180px;">
          <div style="font-weight:600; margin-bottom:10px;">${s.name}</div>
          <div style="font-size:12px; color:${s.ready ? 'var(--accent)' : 'orange'}; margin-bottom:15px;">
            ${s.ready ? '● Conectado' : '○ Offline'}
          </div>
          <button onclick="initAccount('${id}')" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; width:100%;">
            ${s.ready ? 'Reiniciar' : 'Conectar'}
          </button>
        </div>
      `).join('');
    }

    async function initAccount(id) {
      socket.emit('init_account', { accountId: id });
    }

    async function loadChats() {
      try {
        const res = await fetch('/chats');
        allChats = await res.json();
        renderChatList();
      } catch (e) { console.error("Erro ao carregar chats", e); }
    }

    function renderChatList() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const list = document.getElementById('chat-list');
      const filtered = allChats.filter(c => c.name.toLowerCase().includes(search));

      list.innerHTML = filtered.map(chat => `
        <div class="chat-item ${activeChat?.id === chat.id ? 'active' : ''}" onclick="selectChat('${chat.id}', '${chat.name}')">
          <div class="chat-info">
            <div class="chat-name">${chat.name}</div>
            <div style="font-size:12px; color:var(--text-secondary);">${chat.accountId}</div>
          </div>
        </div>
      `).join('');
    }

    async function selectChat(id, name) {
      activeChat = { id, name };
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-input-area').style.display = 'flex';
      document.getElementById('active-chat-name').innerText = name;
      renderChatList();

      const res = await fetch(`/chats/${id}/messages`);
      const msgs = await res.json();
      const area = document.getElementById('messages-area');
      area.innerHTML = '';
      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = `msg ${m.fromMe ? 'msg-out' : 'msg-in'}`;
        div.innerText = m.body;
        area.appendChild(div);
      });
      area.scrollTop = area.scrollHeight;
    }

    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const body = input.value.trim();
      if (!body || !activeChat) return;
      input.value = '';
      await fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: activeChat.id, body })
      });
      selectChat(activeChat.id, activeChat.name);
    }

    // Inicialização
    fetch('/status').then(r => r.json()).then(states => {
      accountStates = states;
      renderAccounts();
      if (Object.values(states).some(s => s.ready)) loadChats();
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Multi</title>

  <!-- SOCKET CORRETO -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: #fff;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 300px;
      background: #1f2c33;
      overflow: auto;
    }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .item:hover {
      background: #2a3942;
    }

    .msgs {
      flex: 1;
      overflow: auto;
      padding: 10px;
    }

    .msg {
      margin: 5px 0;
    }

    .me {
      text-align: right;
      color: #00a884;
    }
  </style>
</head>

<body>

  <div id="app">

    <div class="sidebar">
      <button onclick="add('acc1')">Add acc1</button>
      <button onclick="add('acc2')">Add acc2</button>
      <div id="chats"></div>
    </div>

    <div class="chat">
      <div id="msgs" class="msgs"></div>
      <input id="input" placeholder="Mensagem">
    </div>

  </div>

  <script>
    const socket = io();

    let chats = [];
    let active = null;

    // ─── LOAD CHATS ─────────────────
    async function loadChats() {
      const r = await fetch('/chats');
      chats = await r.json();
      renderChats();
    }

    function renderChats() {
      const el = document.getElementById('chats');
      el.innerHTML = chats.map(c => `
    <div class="item" onclick="openChat('${c.id}')">
      ${c.name}
    </div>
  `).join('');
    }

    // ─── OPEN CHAT ─────────────────
    async function openChat(id) {
      active = id;

      const r = await fetch('/messages/' + encodeURIComponent(id));
      const msgs = await r.json();

      const box = document.getElementById('msgs');

      box.innerHTML = msgs.map(m => `
    <div class="msg ${m.fromMe ? 'me' : ''}">
      ${m.body}
    </div>
  `).join('');
    }

    // ─── SEND ─────────────────
    document.getElementById('input').addEventListener('keydown', async e => {
      if (e.key === 'Enter') {
        const body = e.target.value;
        e.target.value = '';

        await fetch('/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: active, body })
        });
      }
    });

    // ─── SOCKET ─────────────────
    socket.on('new_message', msg => {
      if (active === msg.accountId + ':' + msg.chatId) {
        const box = document.getElementById('msgs');
        box.innerHTML += `<div class="msg ${msg.fromMe ? 'me' : ''}">${msg.body}</div>`;
      }
    });

    // ─── INIT ─────────────────
    fetch('/status').then(() => loadChats());

    // ─── ADD ─────────────────
    async function add(id) {
      await fetch('/initialize/' + id, { method: 'POST' });
    }
  </script>

</body>

</html>

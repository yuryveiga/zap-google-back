<script>
  const socket = io();

  let accountStates = {};
  let allChats = [];
  let activeChat = null;
  let activeFilter = 'all';
  let avatarCache = {};
  let contactCache = {};

  const COLORS = ['#e74c3c', '#e67e22', '#2ecc71', '#3498db', '#9b59b6', '#1abc9c', '#e91e63', '#00bcd4', '#ff5722', '#607d8b'];
  const ACC_COLORS = { acc1: '#00a884', acc2: '#3498db', acc3: '#9b59b6', acc4: '#e74c3c' };

  function avatarColor(name) { let h = 0; for (let i = 0; i < (name || '').length; i++)h += name.charCodeAt(i); return COLORS[h % COLORS.length]; }
  function accColor(id) { return ACC_COLORS[id] || '#667781'; }
  function esc(t) { return (t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function initials(name) { if (!name) return '?'; return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase(); }

  // ── FIX 1: corrigido uso do event ──
  function showSettingsSection(section, el) {
    document.querySelectorAll('.settings-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.settings-menu-item').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + section).classList.add('active');
    if (el) el.classList.add('active');
  }

  // ── Modal ─────────────────────────
  let _pendingSlotId = null;

  function openAddModal(slotId) {
    // FIX 2: garantir slot válido
    if (!slotId) {
      alert('Selecione um slot (acc1 ou acc2)');
      return;
    }
    _pendingSlotId = slotId;
    document.getElementById('modal-add').classList.add('active');
    setTimeout(() => document.getElementById('new-acc-name').focus(), 50);
  }

  function closeAddModal() {
    document.getElementById('modal-add').classList.remove('active');
    document.getElementById('new-acc-name').value = '';
  }

  async function confirmAddAccount() {
    const name = document.getElementById('new-acc-name').value.trim();
    if (!name) return alert('Por favor, insira um nome.');

    const accountId = _pendingSlotId;

    if (!accountId) {
      alert('Erro: slot inválido');
      return;
    }

    accountStates[accountId] = {
      status: 'starting',
      qr: null,
      ready: false,
      loadingPercent: 0,
      name
    };

    closeAddModal();
    updateConnGrid();

    try {
      await fetch('/initialize/' + accountId, { method: 'POST' });
    } catch (e) {
      alert('Erro ao inicializar conta');
    }
  }

  // ── Conexões ──────────────────────
  const SLOTS = ['acc1', 'acc2'];

  function updateConnGrid() {
    const grid = document.getElementById('conn-grid');

    grid.innerHTML = SLOTS.map(id => {
      const s = accountStates[id];

      if (!s) {
        return `
        <div class="conn-card" style="align-items:center;justify-content:center;min-height:260px;border:2px dashed var(--border);background:transparent">
          <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;text-align:center">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--bg-input);display:flex;align-items:center;justify-content:center;font-size:30px">&#128247;</div>
            <div>
              <p style="font-size:15px;font-weight:600">Slot ${id.replace('acc', '')}</p>
              <p style="font-size:13px;color:var(--text-secondary)">Nenhuma conta conectada</p>
            </div>
            <button class="btn-add" onclick="openAddModal('${id}')">+ Adicionar WhatsApp</button>
          </div>
        </div>`;
      }

      const qrHtml = s.qr
        ? `<div class="conn-qr-box"><img src="${s.qr}"/></div>`
        : `<div class="conn-qr-placeholder">${s.status}</div>`;

      return `
      <div class="conn-card">
        <h3>${esc(s.name)}</h3>
        ${qrHtml}
        <button class="btn-danger" onclick="resetAccount('${id}')">Resetar</button>
      </div>`;
    }).join('');
  }

  async function resetAccount(id) {
    if (!confirm('Resetar sessão?')) return;
    await fetch('/reset/' + id, { method: 'POST' });
  }

  // ── INIT ──────────────────────────
  fetch('/status')
    .then(r => r.json())
    .then(states => {
      Object.assign(accountStates, states);
      updateConnGrid();
    });
</script>

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>WhatsApp Multi-Device</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #111b21;
      --panel: #202c33;
      --input: #2a3942;
      --accent: #00a884;
      --text: #e9edef;
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 350px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
    }

    .header {
      padding: 15px;
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search-area {
      padding: 10px;
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      background: var(--input);
      border: none;
      padding: 10px;
      color: white;
      border-radius: 8px;
      outline: none;
    }

    .btn-action {
      background: var(--input);
      border: none;
      color: #8696a0;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-action:hover {
      color: white;
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      padding: 15px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .chat-item:hover {
      background: #2a3942;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0b141a;
    }

    /* Telas Sobrepostas (Modais) */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .card {
      background: var(--panel);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 400px;
    }

    .loader {
      border: 3px solid #333;
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div id="overlay-conn" class="overlay">
    <div class="card">
      <h3 id="conn-title">Conectar Instância</h3>
      <div id="qr-container" style="background:white; padding:10px; margin:20px 0; display:inline-block;"></div>
      <p id="conn-status">Aguardando QR Code...</p>
      <button onclick="closeConn()" style="margin-top:20px; padding:10px 20px;">Voltar</button>
    </div>
  </div>

  <div id="sidebar">
    <div class="header">
      <span>Conversas</span>
      <button class="btn-action" onclick="showAccounts()" title="Gerenciar Conexões">⚙️ Conexões</button>
    </div>
    <div class="search-area">
      <input type="text" id="search" placeholder="Pesquisar..." oninput="renderChats()">
      <button class="btn-action" onclick="loadChats()">↻</button>
    </div>
    <div id="chat-list">
      <p style="text-align:center; color:#8696a0; margin-top:20px;">Carregando...</p>
    </div>
  </div>

  <div id="main">
    <div style="margin: auto; text-align: center; color: #8696a0;">
      <h2>WhatsApp Web Multi-Device</h2>
      <p>Conecte suas contas para começar.</p>
    </div>
  </div>

  <script>
    const socket = io();
    let allChats = [];
    let accountStates = {};

    socket.on('status_update', (data) => {
      const { accountId, status, qr, ready } = data;
      const wasReady = accountStates[accountId]?.ready || false;
      accountStates[accountId] = data;

      if (status === 'qr' && qr) {
        document.getElementById('overlay-conn').style.display = 'flex';
        document.getElementById('qr-container').innerHTML = `<img src="${qr}" style="width:200px;">`;
        document.getElementById('conn-status').innerText = `Escaneie para: ${accountId}`;
      }

      if (!wasReady && ready) {
        document.getElementById('overlay-conn').style.display = 'none';
        document.getElementById('chat-list').innerHTML = '<div class="loader"></div><p style="text-align:center">Sincronizando...</p>';
        setTimeout(loadChats, 3500);
      }
    });

    function closeConn() { document.getElementById('overlay-conn').style.display = 'none'; }
    function showAccounts() { alert("As instâncias são automáticas. Se precisar de um novo QR Code, ele aparecerá na tela."); }

    async function loadChats() {
      try {
        const res = await fetch('/chats');
        allChats = await res.json();
        renderChats();
      } catch (e) { console.log("Erro ao carregar chats"); }
    }

    function renderChats() {
      const list = document.getElementById('chat-list');
      list.innerHTML = allChats.map(c => `
        <div class="chat-item">
          <strong>${c.name}</strong><br>
          <small style="color:#8696a0">${c.accountId}</small>
        </div>
      `).join('');
    }

    // Init
    fetch('/status').then(r => r.json()).then(s => {
      accountStates = s;
      if (Object.values(s).some(acc => acc.ready)) loadChats();
    });
  </script>
</body>

</html>

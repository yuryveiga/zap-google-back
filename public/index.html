<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>CRM WhatsApp</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: #fff;
    }

    .hidden {
      display: none;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .col {
      flex: 1;
      border-right: 1px solid #222;
      overflow: auto;
    }

    .chat {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .chat:hover {
      background: #222;
    }

    #chatArea {
      width: 40%;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow: auto;
      padding: 10px;
    }

    .me {
      text-align: right;
      color: #00a884;
    }

    input {
      width: 100%;
      padding: 10px;
      border: none;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>
    <input id="user" placeholder="usuario"><br>
    <input id="pass" placeholder="senha" type="password"><br>
    <button onclick="login()">Entrar</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <div class="container">

      <div class="col" id="newCol"></div>
      <div class="col" id="assignedCol"></div>

      <div id="chatArea">
        <div id="messages"></div>
        <input id="input" placeholder="Digite..." />
      </div>

    </div>
  </div>

  <script>
    const socket = io();

    let token = null;
    let user = null;
    let crmData = [];
    let activeChat = null;

    // LOGIN
    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: userInput.value,
          password: pass.value
        })
      });

      const data = await res.json();

      token = data.token;
      user = data.user;

      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');

      loadCRM();
    }

    // LOAD
    async function loadCRM() {
      const res = await fetch('/crm', {
        headers: { Authorization: token }
      });
      crmData = await res.json();
      render();
    }

    // RENDER
    function render() {
      newCol.innerHTML = '<h2>Novos</h2>';
      assignedCol.innerHTML = '<h2>Em atendimento</h2>';

      crmData.forEach(chat => {
        const el = document.createElement('div');
        el.className = 'chat';
        el.innerText = chat.name + (chat.assignedTo ? ` (${chat.assignedTo})` : '');

        el.onclick = () => openChat(chat);

        if (chat.status === 'new') newCol.appendChild(el);
        else assignedCol.appendChild(el);
      });
    }

    // OPEN
    async function openChat(chat) {
      activeChat = chat;

      if (chat.status === 'new') {
        await fetch('/crm/assign', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: token
          },
          body: JSON.stringify({ chatId: chat.id })
        });
      }

      renderMessages();
    }

    // MESSAGES
    function renderMessages() {
      messages.innerHTML = '';

      activeChat.messages.forEach(m => {
        const div = document.createElement('div');
        div.className = m.fromMe ? 'me' : '';
        div.innerText = m.body;
        messages.appendChild(div);
      });
    }

    // SEND
    input.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        await fetch('/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: token
          },
          body: JSON.stringify({
            to: activeChat.id,
            body: input.value
          })
        });

        input.value = '';
      }
    });

    // SOCKET
    socket.on('crm_update', (chat) => {
      const i = crmData.findIndex(c => c.id === chat.id);
      if (i >= 0) crmData[i] = chat;
      else crmData.push(chat);

      render();

      if (activeChat && activeChat.id === chat.id) {
        activeChat = chat;
        renderMessages();
      }
    });
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>WhatsApp Multi-Device</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #111b21;
      --panel: #2a3942;
      --text: #e9edef;
      --accent: #00a884;
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 350px;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 15px;
      background: #202c33;
      font-weight: bold;
    }

    .search-area {
      padding: 10px;
      display: flex;
      gap: 5px;
    }

    input {
      flex: 1;
      background: #2a3942;
      border: none;
      padding: 8px;
      color: white;
      border-radius: 5px;
    }

    .btn-refresh {
      cursor: pointer;
      background: #2a3942;
      border: none;
      color: white;
      padding: 0 10px;
      border-radius: 5px;
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      padding: 15px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .chat-item:hover {
      background: #202c33;
    }

    .spinner {
      border: 3px solid #333;
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    #qr-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
  </style>
</head>

<body>

  <div id="qr-screen">
    <h2>Escaneie o QR Code</h2>
    <div id="qr-container" style="background: white; padding: 20px; border-radius: 10px;"></div>
    <p>Aguardando conexão...</p>
  </div>

  <div id="sidebar">
    <div class="header">Conversas</div>
    <div class="search-area">
      <input type="text" id="search" placeholder="Procurar...">
      <button class="btn-refresh" onclick="loadChats()">↻</button>
    </div>
    <div id="chat-list"></div>
  </div>

  <div id="main" style="flex:1; display:flex; align-items:center; justify-content:center;">
    <p style="color: #8696a0;">Selecione uma conversa para visualizar</p>
  </div>

  <script>
    const socket = io();
    let accountStates = {};

    socket.on('status_update', (data) => {
      const { accountId, status, qr, ready } = data;
      const wasReady = accountStates[accountId]?.ready || false;
      accountStates[accountId] = data;

      if (status === 'qr' && qr) {
        document.getElementById('qr-screen').style.display = 'flex';
        document.getElementById('qr-container').innerHTML = `<img src="${qr}">`;
      }

      if (!wasReady && ready) {
        document.getElementById('qr-screen').style.display = 'none';
        document.getElementById('chat-list').innerHTML = '<div class="spinner"></div><p style="text-align:center">Sincronizando...</p>';
        setTimeout(loadChats, 3500);
      }
    });

    async function loadChats() {
      const res = await fetch('/chats');
      const chats = await res.json();
      const list = document.getElementById('chat-list');
      list.innerHTML = chats.map(c => `
        <div class="chat-item">
          <div><strong>${c.name}</strong></div>
          <small style="color: #8696a0;">Conta: ${c.accountId}</small>
        </div>
      `).join('');
    }

    // Carregar ao iniciar
    fetch('/status').then(r => r.json()).then(s => {
      accountStates = s;
      if (Object.values(s).some(acc => acc.ready)) loadChats();
    });
  </script>
</body>

</html>

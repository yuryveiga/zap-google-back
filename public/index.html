<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>WhatsApp Manager</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #111b21;
      --sidebar: #202c33;
      --accent: #00a884;
      --text: #e9edef;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Estrutura Principal */
    #app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    #sidebar {
      width: 350px;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b141a;
    }

    /* Estilo dos Chats */
    .chat-item {
      padding: 15px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .chat-item:hover {
      background: #2a3942;
    }

    /* Botão de Configuração no Canto Inferior */
    #settings-trigger {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: #2a3942;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
    }

    /* Aba de Conexões (Overlay) */
    #connections-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: none;
      flex-direction: column;
      z-index: 100;
    }

    .conn-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    .slots-container {
      display: flex;
      gap: 20px;
      padding: 40px;
      justify-content: center;
    }

    .slot {
      width: 250px;
      height: 300px;
      border: 2px dashed #444;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .slot.active {
      border-style: solid;
      border-color: var(--accent);
      background: #1f2c33;
    }

    .qr-box img {
      width: 180px;
      height: 180px;
      background: white;
      padding: 5px;
    }

    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="app-container">
    <div id="sidebar">
      <div style="padding: 15px; background: var(--sidebar); font-weight: bold;">Conversas</div>
      <div id="chat-list" style="flex:1; overflow-y:auto;">
        <p style="text-align:center; color:#8696a0; margin-top:20px;">Nenhuma conversa carregada.</p>
      </div>

      <button id="settings-trigger" onclick="toggleConnections(true)">⚙️</button>
    </div>

    <div id="main-content">
      <p style="color: #8696a0;">Selecione um chat ou abra as configurações para conectar.</p>
    </div>
  </div>

  <div id="connections-page">
    <div class="conn-header">
      <h2>Conexões</h2>
      <button class="btn-add" onclick="addNewInstance()">+ Adicionar WhatsApp</button>
      <button onclick="toggleConnections(false)"
        style="background:none; border:none; color:white; cursor:pointer; font-size:24px;">✕</button>
    </div>

    <div class="slots-container">
      <div id="slot-CONTA_01" class="slot">
        <p style="color:#666">Slot 1 vazio</p>
      </div>
      <div id="slot-CONTA_02" class="slot">
        <p style="color:#666">Slot 2 vazio</p>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    let accountStates = {};

    function toggleConnections(show) {
      document.getElementById('connections-page').style.display = show ? 'flex' : 'none';
    }

    socket.on('status_update', (data) => {
      const { accountId, status, qr, ready } = data;
      accountStates[accountId] = data;
      updateSlotUI(accountId);

      if (ready) {
        loadChats();
      }
    });

    function updateSlotUI(id) {
      const slot = document.getElementById(`slot-${id}`);
      const state = accountStates[id];

      if (state.status === 'qr' && state.qr) {
        slot.className = "slot active";
        slot.innerHTML = `<h4>Conectar ${id}</h4><div class="qr-box"><img src="${state.qr}"></div>`;
      } else if (state.ready) {
        slot.className = "slot active";
        slot.innerHTML = `<h4 style="color:var(--accent)">● Conectado</h4><p>${id}</p>`;
      }
    }

    async function addNewInstance() {
      // Tenta inicializar o primeiro slot disponível
      const nextId = !accountStates['CONTA_01']?.ready ? 'CONTA_01' : 'CONTA_02';
      await fetch('/init-instance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: nextId })
      });
      alert("Iniciando instância... Aguarde o QR Code aparecer no slot.");
    }

    async function loadChats() {
      const res = await fetch('/chats');
      const chats = await res.json();
      const list = document.getElementById('chat-list');
      list.innerHTML = chats.map(c => `
        <div class="chat-item">
          <strong>${c.name}</strong><br><small>${c.accountId}</small>
        </div>
      `).join('');
    }

    // Carregar status inicial
    fetch('/status').then(r => r.json()).then(s => {
      accountStates = s;
      Object.keys(s).forEach(id => updateSlotUI(id));
      if (Object.values(s).some(acc => acc.ready)) loadChats();
    });
  </script>
</body>

</html>

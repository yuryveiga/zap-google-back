<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>WhatsApp Multi</title>

  <!-- SOCKET CORRETO -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    .container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 50px;
    }

    .card {
      width: 250px;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    img {
      width: 200px;
    }
  </style>
</head>

<body>

  <h1>Conexões WhatsApp</h1>

  <div class="container" id="grid"></div>

  <!-- MODAL -->
  <div id="modal" style="display:none;">
    <input id="name" placeholder="Nome da conta">
    <button onclick="confirmAdd()">OK</button>
  </div>

  <script>
    const socket = io();

    const SLOTS = ['acc1', 'acc2'];
    let states = {};
    let currentSlot = null;

    // ─── RENDER ─────────────────────────
    function render() {
      const grid = document.getElementById('grid');

      grid.innerHTML = SLOTS.map(id => {
        const s = states[id];

        if (!s) {
          return `
      <div class="card">
        <h3>${id}</h3>
        <button onclick="add('${id}')">Adicionar</button>
      </div>`;
        }

        return `
    <div class="card">
      <h3>${s.name}</h3>
      <p>${s.status}</p>
      ${s.qr ? `<img src="${s.qr}"/>` : ''}
      <button onclick="reset('${id}')">Reset</button>
    </div>`;
      }).join('');
    }

    // ─── ADD ────────────────────────────
    function add(id) {
      currentSlot = id;
      document.getElementById('modal').style.display = 'block';
    }

    async function confirmAdd() {
      const name = document.getElementById('name').value;

      states[currentSlot] = {
        name,
        status: 'starting'
      };

      render();

      await fetch('/initialize/' + currentSlot, { method: 'POST' });

      document.getElementById('modal').style.display = 'none';
    }

    // ─── RESET ──────────────────────────
    async function reset(id) {
      await fetch('/reset/' + id, { method: 'POST' });
    }

    // ─── SOCKET ─────────────────────────
    socket.on('status_update', data => {
      states[data.accountId] = data;
      render();
    });

    // ─── INIT ───────────────────────────
    fetch('/status')
      .then(r => r.json())
      .then(data => {
        states = data;
        render();
      });
  </script>

</body>

</html>

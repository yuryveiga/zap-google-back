<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>CRM WhatsApp</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: #fff;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .col {
      flex: 1;
      border-right: 1px solid #222;
      overflow: auto;
    }

    .col h2 {
      padding: 10px;
      background: #222;
      margin: 0;
    }

    .chat {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .chat:hover {
      background: #222;
    }

    #chatArea {
      width: 40%;
      background: #0b141a;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow: auto;
      padding: 10px;
    }

    .msg {
      margin: 5px 0;
    }

    .me {
      text-align: right;
      color: #00a884;
    }

    input {
      width: 100%;
      padding: 10px;
      border: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="col" id="newCol">
      <h2>Novos</h2>
    </div>

    <div class="col" id="assignedCol">
      <h2>Em atendimento</h2>
    </div>

    <div id="chatArea">
      <div id="messages"></div>
      <input id="input" placeholder="Digite..." />
    </div>

  </div>

  <script>
    const socket = io();

    let crmData = [];
    let activeChat = null;

    // ─── LOAD ─────────────────────────────
    async function loadCRM() {
      const res = await fetch('/crm');
      crmData = await res.json();
      render();
    }

    // ─── RENDER ───────────────────────────
    function render() {
      const newCol = document.getElementById('newCol');
      const assignedCol = document.getElementById('assignedCol');

      newCol.innerHTML = '<h2>Novos</h2>';
      assignedCol.innerHTML = '<h2>Em atendimento</h2>';

      crmData.forEach(chat => {
        const el = document.createElement('div');
        el.className = 'chat';
        el.innerText = chat.name;

        el.onclick = () => openChat(chat);

        if (chat.status === 'new') newCol.appendChild(el);
        else assignedCol.appendChild(el);
      });
    }

    // ─── OPEN CHAT ────────────────────────
    function openChat(chat) {
      activeChat = chat;

      if (chat.status === 'new') {
        fetch('/crm/assign', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chatId: chat.id })
        });
      }

      renderMessages();
    }

    // ─── RENDER MESSAGES ──────────────────
    function renderMessages() {
      const box = document.getElementById('messages');
      box.innerHTML = '';

      if (!activeChat) return;

      activeChat.messages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + (m.fromMe ? 'me' : '');
        div.innerText = m.body;
        box.appendChild(div);
      });

      box.scrollTop = box.scrollHeight;
    }

    // ─── SEND ─────────────────────────────
    document.getElementById('input').addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const text = e.target.value;
        e.target.value = '';

        await fetch('/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            to: activeChat.id,
            body: text
          })
        });
      }
    });

    // ─── SOCKET ───────────────────────────
    socket.on('crm_update', (chat) => {
      const i = crmData.findIndex(c => c.id === chat.id);

      if (i >= 0) crmData[i] = chat;
      else crmData.push(chat);

      render();

      if (activeChat && activeChat.id === chat.id) {
        activeChat = chat;
        renderMessages();
      }
    });

    // ─── INIT ─────────────────────────────
    loadCRM();
  </script>

</body>

</html>
